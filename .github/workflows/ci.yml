name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ------------------------------------------------------------------
  # JOB 1: Backend Setup and Tests
  # ------------------------------------------------------------------
  backend-tests:
    name: Backend Setup & Tests
    runs-on: ubuntu-latest
    env:
      GOBIN: ${{ github.workspace }}/.cache/go-tools/bin
      GOTESTSUM_VERSION: v1.13.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Wails environment
        uses: ./.github/actions/setup-wails

      - name: Add Go tools to PATH
        run: |
          mkdir -p "${GOBIN}"
          echo "${GOBIN}" >> "${GITHUB_PATH}"

      - name: Cache Go tools
        uses: actions/cache@v5
        id: go-tools-cache
        with:
          path: ${{ env.GOBIN }}
          key: ${{ runner.os }}-go-tools-gotestsum-${{ env.GOTESTSUM_VERSION }}

      # Create placeholder for go:embed directive (actual build happens in bundle-size-check job)
      - name: Create frontend dist placeholder
        run: |
          mkdir -p frontend/dist
          echo "<!doctype html><title>placeholder</title>" > frontend/dist/index.html

      - name: Install gotestsum
        if: steps.go-tools-cache.outputs.cache-hit != 'true'
        run: go install gotest.tools/gotestsum@${GOTESTSUM_VERSION}

      - name: Run Go Tests
        # Runs tests while the wails source and modified go.mod are present
        run: gotestsum --format=pkgname --format-icons=hivis ./internal/...

  # ------------------------------------------------------------------
  # JOB 2: Dead Code Check
  # ------------------------------------------------------------------
  deadcode:
    name: Dead Code Check
    runs-on: ubuntu-latest
    env:
      GOBIN: ${{ github.workspace }}/.cache/go-tools/bin
      DEADCODE_VERSION: v0.38.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Wails environment
        uses: ./.github/actions/setup-wails

      - name: Add Go tools to PATH
        run: |
          mkdir -p "${GOBIN}"
          echo "${GOBIN}" >> "${GITHUB_PATH}"

      - name: Cache Go tools
        uses: actions/cache@v5
        id: go-tools-cache
        with:
          path: ${{ env.GOBIN }}
          key: ${{ runner.os }}-go-tools-deadcode-${{ env.DEADCODE_VERSION }}

      - name: Install deadcode
        if: steps.go-tools-cache.outputs.cache-hit != 'true'
        run: go install golang.org/x/tools/cmd/deadcode@${DEADCODE_VERSION}

      - name: Check for dead code
        run: deadcode ./...

  # ------------------------------------------------------------------
  # JOB 3: Frontend Checks (Lint/Typecheck/Unit Tests)
  # ------------------------------------------------------------------
  frontend-checks:
    name: Frontend ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Format
            command: bun run format:check
            run-knip: false
          - name: Lint
            command: bun run lint:check
            run-knip: true
          - name: Typecheck
            command: bun run tsgo
            run-knip: false
          - name: Unit Tests
            command: bun run test:unit
            run-knip: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-frontend
        with:
          run-knip: ${{ matrix.run-knip }}

      - name: Setup Wails environment
        uses: ./.github/actions/setup-wails
        with:
          generate-bindings: "true"

      - name: Run ${{ matrix.name }}
        working-directory: ./frontend
        run: ${{ matrix.command }}

  # ------------------------------------------------------------------
  # JOB 4: Playwright Tests
  # ------------------------------------------------------------------
  playwright-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Uses the custom action from File 1
      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-frontend

      - name: Setup Wails environment
        uses: ./.github/actions/setup-wails
        with:
          generate-bindings: "true"

      # Cache Playwright Browsers specifically
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/bun.lock') }}

      # Only download browsers if the cache was NOT found
      - name: Install Playwright Browsers
        working-directory: ./frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ./frontend
        run: bun run test:e2e:ci

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # ------------------------------------------------------------------
  # JOB 5: Bundle Size Check
  # ------------------------------------------------------------------
  bundle-size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Frontend Environment
        uses: ./.github/actions/setup-frontend

      - name: Setup Wails environment
        uses: ./.github/actions/setup-wails
        with:
          generate-bindings: "true"

      - name: Build for production
        working-directory: ./frontend
        run: bun run build:ci

      - name: Check bundle size
        working-directory: ./frontend
        run: bun run size
