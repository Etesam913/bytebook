name: "Setup Wails"
description: "Install Linux dependencies, set up Go and Wails v3, fix the local replace directive, and optionally generate bindings"
inputs:
  generate-bindings:
    description: "Generate Wails bindings for ./internal/..."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libglib2.0-dev libsoup-3.0-dev libzmq3-dev

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Setup Wails v3 Source
      shell: bash
      run: |
        git clone --depth 1 --branch master https://github.com/wailsapp/wails.git
        cd wails
        cd v3/cmd/wails3
        go install

    - name: Fix Wails replace directive
      shell: bash
      run: |
        sed -i 's|replace github.com/wailsapp/wails/v3 => ../wails/v3|replace github.com/wailsapp/wails/v3 => ./wails/v3|g' go.mod
        go mod download

    - name: Generate Wails bindings
      if: ${{ inputs.generate-bindings == 'true' }}
      shell: bash
      run: wails3 generate bindings ./internal/...
